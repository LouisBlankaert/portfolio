<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="0.5" stop-color="#00f5ff"/>
      <stop offset="1" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "Louis" text - Glow background -->
  <text x="5" y="30" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="url(#neonGradient)" opacity="0.3" filter="url(#glow)">
    LOUIS
  </text>

  <!-- "Louis" text - Main -->
  <text x="5" y="30" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="url(#neonGradient)" filter="url(#glow)">
    LOUIS
  </text>

  <!-- "Blankaert" text - Glow background -->
  <text x="5" y="60" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="url(#neonGradient)" opacity="0.3" filter="url(#glow)">
    BLANKAERT
  </text>

  <!-- "Blankaert" text - Main -->
  <text x="5" y="60" font-family="Poppins, sans-serif" font-size="24" font-weight="700" fill="url(#neonGradient)" filter="url(#glow)">
    BLANKAERT
  </text>
</svg>
